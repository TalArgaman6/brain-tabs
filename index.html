<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>When your brain has too many tabs open</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/poly-decomp@0.2.1/build/decomp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="scene" id="scene">
        <div class="architectural-wall" id="galleryWall">
            <div class="wall-panel wall-panel--tl"></div>
            <div class="wall-panel wall-panel--tr"></div>
            <div class="wall-panel wall-panel--bl"></div>
            <div class="wall-panel wall-panel--br"></div>

            <div class="window-frame" id="windowFrame">
                <div class="window-container" id="windowContainer">
                    <div class="window-interior" id="windowInterior">
                        <div
                            class="bg-text"
                            id="bgText"
                            contenteditable="true"
                            spellcheck="false"
                            role="textbox"
                            aria-label="Installation quote"
                            data-placeholder="when your brain has too many tabs open"
                        >when your brain has too many tabs open</div>
                        <canvas id="worldCanvas"></canvas>
                    </div>
                    <div class="glass-pane glass-pane--left" aria-hidden="true"></div>
                    <div class="glass-pane glass-pane--center" aria-hidden="true"></div>
                    <div class="glass-pane glass-pane--right" aria-hidden="true"></div>
                    <div class="glass-shine" aria-hidden="true"></div>
                </div>
                <div class="window-sill" aria-hidden="true">
                    <span></span><span></span><span></span>
                </div>
            </div>

            <div class="controls-container">
                <button class="control-btn control-btn--minus" id="removeBtn" type="button" aria-label="Remove tab">−</button>
                <label class="count-field" for="countInput">
                    <input
                        type="number"
                        id="countInput"
                        class="count-input"
                        min="0"
                        max="1500"
                        value="0"
                        inputmode="numeric"
                        aria-label="Number of tabs"
                    >
                    <span class="count-suffix">tabs</span>
                </label>
                <button class="control-btn control-btn--text" id="editTextBtn" type="button" aria-label="Edit quote" title="Edit quote">Aa</button>
                <button class="control-btn" id="addBtn" type="button" aria-label="Add tab">+</button>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
